<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ChroniCare AI</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="logo-icon">❤️</div>
      <h2 style="color:var(--primary);">Create Account</h2>
      <p style="color:var(--text-muted);font-size:.88rem;">Join ChroniCare AI — Free Forever</p>
    </div>

    <div id="alertBox"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required />
        <div class="field-error"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
        Create Account
      </button>
    </form>

    <div style="text-align:center;margin-top:1.2rem;">
      <p style="color:var(--text-muted);font-size:.88rem;">
        Already have an account? <a href="/login">Sign in</a>
      </p>
      <p style="margin-top:.5rem;">
        <a href="/" style="color:var(--text-muted);font-size:.82rem;">← Back to Home</a>
      </p>
    </div>
    <p style="font-size:.73rem;color:var(--text-light);text-align:center;margin-top:1rem;">
      By creating an account you agree that this app is for informational use only and does not replace professional medical advice.
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  redirectIfLoggedIn('/dashboard');

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    const btn      = document.getElementById('registerBtn');

    const valid = validateForm(e.target, {
      name:     { required: true, minLength: 2 },
      email:    { required: true, email: true },
      password: { required: true, minLength: 6 }
    });
    if (!valid) return;

    const pass    = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (pass !== confirm) {
      document.getElementById('confirmPassword').classList.add('error');
      document.querySelector('#confirmPassword').closest('.form-group').querySelector('.field-error').textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    alertBox.innerHTML = '';

    try {
      await API.post('/api/auth/register', {
        name:     document.getElementById('name').value.trim(),
        email:    document.getElementById('email').value.trim(),
        password: pass
      });
      showToast('Account created! Setting up your profile…', 'success');
      setTimeout(() => window.location.href = '/patient-register', 1200);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-danger">⚠️ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
