<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ChroniCare AI</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">❤️</div>
      <h2 style="color:var(--primary);">ChroniCare AI</h2>
      <p style="color:var(--text-muted);font-size:.88rem;">Sign in to your health dashboard</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
        <div class="field-error"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:1.2rem;">
      <p style="color:var(--text-muted);font-size:.88rem;">
        Don't have an account? <a href="/register">Create one</a>
      </p>
      <p style="margin-top:.5rem;">
        <a href="/" style="color:var(--text-muted);font-size:.82rem;">← Back to Home</a>
      </p>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // If already logged in, redirect to dashboard
  redirectIfLoggedIn('/dashboard');

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    const btn      = document.getElementById('loginBtn');

    const valid = validateForm(e.target, {
      email:    { required: true, email: true },
      password: { required: true, minLength: 1 }
    });
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    alertBox.innerHTML = '';

    try {
      const data = await API.post('/api/auth/login', {
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });
      showToast('Welcome back! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/dashboard', 1000);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-danger">⚠️ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
